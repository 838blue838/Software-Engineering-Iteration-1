<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
 
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Login Page</h1>

      <form id="loginForm">
        <label for="loginUsername">Username:</label>
        <input type="text" id="loginUsername" name="username"  placeholder="ru2026" required/>
        <br>

        <label for="loginPassword">Password:</label>
        <input type="password" id="loginPassword" name="password" placeholder= "Password" required />
        <br>

        <button type="submit" class="btn">Login</button>
      </form>

      <p id="loginMessage" class="message"></p>
      <p class="link-text">Don’t have an account? <a href="signup.html">Sign Up</a></p>
      <p class="link-text"><a href="index.html">Back to Home</a></p>
    </div>
  </div>

  <script>
    document.getElementById("loginForm").addEventListener("submit", async function (e) {
      e.preventDefault();

      const username = document.getElementById("loginUsername").value.trim();
      const password = document.getElementById("loginPassword").value.trim();
      const message = document.getElementById("loginMessage");

      try {
        const response = await fetch("/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        });

        if (response.ok) {
          message.textContent = "Login successful! Redirecting...";
          setTimeout(() => {
            window.location.href = "dashboard.html";
          }, 1000);
        } else {
          const errorText = await response.text();
          message.textContent = errorText || "Invalid username or password.";
        }
      } catch (error) {
        message.textContent = "Server error. Please try again.";
      }
    });
  </script>
</body>
</html>
