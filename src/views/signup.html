<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page">
    <div class="card">
      <div class="auth-badge">Create Account</div>
      <h1>Sign Up</h1>
      <p>Create a new account to access the application dashboard.</p>

      <form action="/api/auth/signup" method="POST">
        <div class="form-group">
          <label for="username">Username</label>
          <input id="username" type="text" name="username" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            id="password"
            type="password"
            name="password"
            minlength="3"
            pattern="^(?=.*[A-Z])(?=.*\d).{3,}$"
            title="Password must be at least 3 characters long and include 1 capital letter and 1 number."
            required
          >
        </div>

        <div class="password-hint">
          Password must be at least 3 characters long and include at least 1 capital letter and 1 number.
        </div>

        <button type="submit">Sign Up</button>

        <p id="signupMessage" class="message message-error"></p>

        <p class="link-text">Already have an account? <a href="/login">Login</a></p>
      </form>

      <div class="link-row">
        <a href="/">Back to Home</a>
      </div>
    </div>
  </div>

  <script>
    const signupParams = new URLSearchParams(window.location.search);
    const signupError = signupParams.get("error");
    if (signupError) {
      document.getElementById("signupMessage").textContent = signupError;
    }
  </script>
</body>
</html>
