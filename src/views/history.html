<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conversation History</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page page-top">
    <div class="card card-history">
      <div class="history-header">
        <div>
          <div class="history-label">Archive</div>
          <h1>Conversation History</h1>
          <p>View, search, and reopen previous multi-LLM comparisons.</p>
        </div>
        <div class="history-header-actions">
          <a class="button button-secondary history-top-button" href="/chat">Go to Chat</a>
          <a class="button button-secondary history-top-button" href="/dashboard">Dashboard</a>
        </div>
      </div>

      <form class="history-search" onsubmit="return false;">
        <input type="text" id="historySearch" placeholder="Search conversations...">
        <button type="button" onclick="filterHistory()">Search</button>
      </form>

      <div class="history-grid" id="historyGrid"></div>
    </div>
  </div>

  <script>
    let conversations = [];

    async function loadHistory() {
      const response = await fetch("/api/chat/conversations");
      conversations = await response.json();
      renderHistory(conversations);
    }

    function renderHistory(items) {
      const grid = document.getElementById("historyGrid");
      grid.innerHTML = "";

      if (!items.length) {
        grid.innerHTML = '<p style="color:var(--muted);">No saved conversations yet.</p>';
        return;
      }

      items.forEach((conversation) => {
        const card = document.createElement("a");
        card.className = "history-card";
        card.href = `/chat?id=${conversation.id}`;
        card.innerHTML = `
          <div class="history-card-top">
            <h2>${conversation.title}</h2>
            <span class="history-time">${new Date(conversation.updated_at).toLocaleDateString()}</span>
          </div>
          <p>${conversation.turnCount} comparison(s)</p>
        `;
        grid.appendChild(card);
      });
    }

    function filterHistory() {
      const term = document.getElementById("historySearch").value.toLowerCase();
      const filtered = conversations.filter((conversation) =>
        conversation.title.toLowerCase().includes(term)
      );
      renderHistory(filtered);
    }

    document.getElementById("historySearch").addEventListener("input", filterHistory);
    loadHistory();
  </script>
</body>
</html>
