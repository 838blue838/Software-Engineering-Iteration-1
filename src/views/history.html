<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conversation History</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page page-top">
    <div class="card card-history">

      
      <div class="history-header">
        <div>
          <div class="history-label">Archive</div>
          <h1>Conversation History</h1>
          <p>View, search, and reopen your previous conversations.</p>
        </div>

        <div class="history-header-actions">
          <a class="button button-secondary history-top-button" href="/chat">
            Go to Chat
          </a>
          <a class="button button-secondary history-top-button" href="/dashboard">
            Dashboard
          </a>
        </div>
      </div>

      
      <form class="history-search" onsubmit="return false;">
        <input type="text" id="historySearch" placeholder="Search conversations...">
        <button type="button" id="searchBtn">Search</button>
      </form>

      
      <div class="history-grid" id="historyGrid">
        <p style="color:var(--muted);">Loading your conversations...</p>
      </div>

    </div>
  </div>

  <script>
    let searchTimeout = null;

    function escapeHtml(text) {
      return text.replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;");
    }

    function formatDate(ts) {
      if (!ts) return "";
      const d = new Date(ts);
      const now = new Date();
      const diff = Math.floor((now - d) / 86400000);

      if (diff === 0) return "Today";
      if (diff === 1) return "Yesterday";
      if (diff < 7) return `${diff} days ago`;
      if (diff < 14) return "Last week";
      return d.toLocaleDateString();
    }

    
    function renderGrid(conversations) {
      const grid = document.getElementById("historyGrid");

      if (conversations.length === 0) {
        grid.innerHTML = '<p style="color:var(--muted);">No conversations found.</p>';
        return;
      }

      grid.innerHTML = conversations.map(c => `
        <div class="history-card">

          <!-- MAIN LINK AREA -->
          <a class="history-card-link" href="/chat?id=${c.id}">
            <div class="history-card-top">
              <h2>
                ${escapeHtml(c.title)}

                <!-- NEW: model tag -->
                <span class="model-tag">
                  ${c.selected_model || "all"}
                </span>
              </h2>

              <span class="history-time">
                ${formatDate(c.updated_at)}
              </span>
            </div>

            <p>Started ${formatDate(c.created_at)}</p>
          </a>

          <!-- NEW: MODEL SELECT (ADDED FEATURE) -->
          <div class="history-model-select">
            <select onchange="changeModel(${c.id}, this.value)">
              <option value="" ${!c.selected_model ? "selected" : ""}>
                All Models
              </option>
              <option value="llama3.2" ${c.selected_model === "llama3.2" ? "selected" : ""}>
                Llama 3.2
              </option>
              <option value="mistral" ${c.selected_model === "mistral" ? "selected" : ""}>
                Mistral
              </option>
              <option value="gemma" ${c.selected_model === "gemma" ? "selected" : ""}>
                Gemma
              </option>
            </select>
          </div>

        </div>
      `).join("");
    }

    
    async function loadHistory() {
      try {
        const res = await fetch("/api/chat/conversations");
        const conversations = await res.json();
        renderGrid(conversations);
      } catch (err) {
        document.getElementById("historyGrid").innerHTML =
          '<p style="color:var(--danger);">Failed to load conversations.</p>';
      }
    }

    
    async function changeModel(id, model) {
      await fetch(`/api/chat/conversations/${id}/model`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ model: model || null })
      });

      loadHistory();
    }

    
    async function searchHistory(term) {
      try {
        const res = await fetch(`/api/chat/search?q=${encodeURIComponent(term)}`);
        const conversations = await res.json();
        renderGrid(conversations);
      } catch (err) {
        document.getElementById("historyGrid").innerHTML =
          '<p style="color:var(--danger);">Search failed. Please try again.</p>';
      }
    }

    document.getElementById("historySearch").addEventListener("input", (e) => {
      const term = e.target.value.trim();
      clearTimeout(searchTimeout);

      searchTimeout = setTimeout(() => {
        if (term.length === 0) {
          loadHistory();
        } else {
          searchHistory(term);
        }
      }, 300);
    });

    document.getElementById("searchBtn").addEventListener("click", () => {
      const term = document.getElementById("historySearch").value.trim();
      if (term.length === 0) loadHistory();
      else searchHistory(term);
    });

    
    loadHistory();
  </script>
</body>
</html>
