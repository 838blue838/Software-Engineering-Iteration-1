<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conversation History</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .history-item { border-bottom: 1px solid #ddd; padding: 10px 0; }
    .history-item:last-child { border-bottom: none; }
    .search-result { background: #fffbe6; border: 1px solid #ffe58f; border-radius: 6px; padding: 8px; margin: 6px 0; font-size: 0.9em; }
    .input-row { display: flex; gap: 8px; margin-bottom: 15px; }
    .input-row input { flex: 1; padding: 8px; }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <h1>Conversation History</h1>

      <div class="input-row">
        <input type="text" id="searchInput" placeholder="Search conversations...">
        <button id="searchBtn">Search</button>
        <button id="clearBtn">Clear</button>
      </div>

      <div id="searchResults" style="display:none; margin-bottom:15px;">
        <h3>Search Results</h3>
        <div id="searchList"></div>
      </div>

      <div id="historyList">
        <p style="color:#999;">Loading conversations...</p>
      </div>

      <br>
      <div class="nav-links">
        <a class="button button-secondary" href="/chat">Go to Chat</a>
        <a class="button button-secondary" href="/dashboard">Back to Dashboard</a>
      </div>
    </div>
  </div>

  <script>
    function escapeHtml(str) {
      return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    async function loadHistory() {
      const res = await fetch("/api/chat/history");
      const convos = await res.json();
      const list = document.getElementById("historyList");

      if (!convos.length) {
        list.innerHTML = "<p style='color:#999;'>No conversations yet.</p>";
        return;
      }

      list.innerHTML = convos.map(c => `
        <div class="history-item">
          <strong>${escapeHtml(c.title)}</strong><br>
          <small>${new Date(c.updated_at).toLocaleString()}</small><br>
          <a href="/chat?id=${c.id}">Open Conversation</a>
        </div>
      `).join("");
    }

    document.getElementById("searchBtn").addEventListener("click", async () => {
      const q = document.getElementById("searchInput").value.trim();
      if (!q) return;

      const res = await fetch(`/api/chat/search?q=${encodeURIComponent(q)}`);
      const results = await res.json();
      const searchResults = document.getElementById("searchResults");
      const searchList = document.getElementById("searchList");

      searchResults.style.display = "block";

      if (!results.length) {
        searchList.innerHTML = "<p style='color:#999;'>No results found.</p>";
        return;
      }

      searchList.innerHTML = results.map(m => `
        <div class="search-result">
          <strong>${escapeHtml(m.conversation_title)}</strong> — <em>${m.role}</em><br>
          ${escapeHtml(m.content)}<br>
          <a href="/chat?id=${m.conversation_id}">Open Conversation</a>
        </div>
      `).join("");
    });

    document.getElementById("clearBtn").addEventListener("click", () => {
      document.getElementById("searchInput").value = "";
      document.getElementById("searchResults").style.display = "none";
    });

    loadHistory();
  </script>
</body>
</html>
