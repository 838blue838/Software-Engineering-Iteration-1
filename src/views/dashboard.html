<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page">
    <div class="card">
      <h1>Dashboard</h1>
      <p>You are successfully logged in.</p>
      <div class="dashboard-box">
        Status: Authenticated user session is active.
      </div>
      <div class="nav-links">
        <a class="button button-secondary" href="/profile">View Profile</a>
        <a class="button button-secondary" href="/about">About This Project</a>
        <a class="button button-secondary" href="/chat">Start Chat</a>
        <a class="button button-secondary" href="/history">Conversation History</a>
        <form action="/api/auth/logout" method="POST" style="display:inline;">
          <button type="submit" class="button button-secondary">Logout</button>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
