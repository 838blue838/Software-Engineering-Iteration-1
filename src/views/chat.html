<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM Chat</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .provider-picker {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .provider-picker label {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0;
    }

    .provider-picker input[type="checkbox"] {
      width: auto;
    }

    .prompt-block {
      margin: 18px 0 12px 0;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(124, 156, 255, 0.14);
      color: #eef2ff;
      font-weight: 600;
    }

    .compare-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .compare-card {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 18px;
      padding: 16px;
    }

    .compare-card h3 {
      margin: 0 0 10px 0;
      font-size: 1rem;
    }

    .compare-card p {
      margin: 0;
    }

    @media (max-width: 950px) {
      .compare-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="chat-page">
    <div class="chat-shell">
      <aside class="chat-sidebar">
        <div class="sidebar-header">
          <div>
            <div class="sidebar-label">Workspace</div>
            <h2>Conversations</h2>
          </div>
          <button id="newChatBtn" class="sidebar-new-chat">+ New Chat</button>
        </div>

        <form class="sidebar-search" onsubmit="return false;">
          <input type="text" id="sidebarSearch" placeholder="Search chats...">
        </form>

        <div class="conversation-list" id="conversationList"></div>

        <div class="sidebar-footer">
          <a class="button button-secondary" href="/history">Full History</a>
          <a class="button button-secondary" href="/dashboard">Dashboard</a>
        </div>
      </aside>

      <main class="chat-main">
        <div class="chat-topbar">
          <div>
            <div class="chat-topbar-label">Multi-LLM Comparison</div>
            <h1 id="chatTitle">Select or start a conversation</h1>
          </div>
          <div class="chat-topbar-actions">
            <a class="button button-secondary topbar-button" href="/history">History</a>
          </div>
        </div>

        <div class="chat-status-banner" id="chatStatusBanner">
          Submit one prompt and compare Ollama, LocalAI, and llama.cpp simultaneously.
        </div>

        <div class="provider-picker" id="providerPicker"></div>

        <div class="chat-window-modern" id="chatWindow"></div>

        <div class="chat-composer">
          <form class="chat-form" id="chatForm">
            <input type="text" id="messageInput" name="message" placeholder="Type one prompt for all selected providers..." autocomplete="off" required>
            <button type="submit" id="sendBtn">Compare</button>
          </form>
        </div>
      </main>
    </div>
  </div>

  <script>
    let activeConversationId = null;
    let allConversations = [];
    let providers = [];

    function getIdFromUrl() {
      return new URLSearchParams(window.location.search).get("id");
    }

    async function loadProviders() {
      const res = await fetch("/api/chat/providers");
      providers = await res.json();

      const picker = document.getElementById("providerPicker");
      picker.innerHTML = "";

      providers.forEach((provider) => {
        const label = document.createElement("label");
        label.innerHTML = `<input type="checkbox" value="${provider.id}" checked> ${provider.label}`;
        picker.appendChild(label);
      });
    }

    function getSelectedProviders() {
      return Array.from(document.querySelectorAll('#providerPicker input[type="checkbox"]:checked'))
        .map((input) => input.value);
    }

    async function loadConversations() {
      const res = await fetch("/api/chat/conversations");
      allConversations = await res.json();
      renderSidebar(allConversations);
    }

    function renderSidebar(conversations) {
      const list = document.getElementById("conversationList");
      list.innerHTML = "";

      if (conversations.length === 0) {
        list.innerHTML = '<p style="color:var(--muted);padding:8px 4px;font-size:0.9rem;">No conversations yet.</p>';
        return;
      }

      conversations.forEach((convo) => {
        const a = document.createElement("a");
        a.href = `/chat?id=${convo.id}`;
        a.className = `conversation-item ${convo.id === activeConversationId ? "active" : ""}`;
        a.innerHTML = `
          <div class="conversation-title">${escapeHtml(convo.title)}</div>
          <div class="conversation-preview">${convo.turnCount} comparison(s)</div>
        `;
        a.addEventListener("click", (e) => {
          e.preventDefault();
          openConversation(convo.id);
          history.pushState(null, "", `/chat?id=${convo.id}`);
        });
        list.appendChild(a);
      });
    }

    async function openConversation(id) {
      activeConversationId = id;
      document.getElementById("chatStatusBanner").style.display = "none";
      document.getElementById("chatWindow").innerHTML = '<p style="color:var(--muted);padding:8px;">Loading...</p>';

      const res = await fetch(`/api/chat/conversations/${id}`);
      if (!res.ok) {
        document.getElementById("chatWindow").innerHTML = '<p style="color:var(--danger);padding:8px;">Failed to load conversation.</p>';
        return;
      }

      const convo = await res.json();
      document.getElementById("chatTitle").textContent = convo.title;
      renderTurns(convo.turns);
      renderSidebar(allConversations);
    }

    function renderTurns(turns) {
      const chatWindow = document.getElementById("chatWindow");
      chatWindow.innerHTML = "";

      if (turns.length === 0) {
        chatWindow.innerHTML = '<p style="color:var(--muted);padding:8px;">No prompts yet. Submit the first one below.</p>';
        return;
      }

      turns.forEach((turn) => {
        const promptBlock = document.createElement("div");
        promptBlock.className = "prompt-block";
        promptBlock.textContent = turn.prompt;
        chatWindow.appendChild(promptBlock);

        const grid = document.createElement("div");
        grid.className = "compare-grid";

        turn.responses.forEach((response) => {
          const card = document.createElement("div");
          card.className = "compare-card";
          card.innerHTML = `
            <h3>${escapeHtml(response.providerLabel)}</h3>
            <p>${escapeHtml(response.text)}</p>
          `;
          grid.appendChild(card);
        });

        chatWindow.appendChild(grid);
      });

      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    async function createConversationIfNeeded() {
      if (activeConversationId) return;

      const res = await fetch("/api/chat/new", { method: "POST" });
      const convo = await res.json();
      activeConversationId = convo.id;
      await loadConversations();
      history.pushState(null, "", `/chat?id=${convo.id}`);
      document.getElementById("chatTitle").textContent = convo.title;
    }

    document.getElementById("newChatBtn").addEventListener("click", async () => {
      const res = await fetch("/api/chat/new", { method: "POST" });
      const convo = await res.json();
      await loadConversations();
      await openConversation(convo.id);
      history.pushState(null, "", `/chat?id=${convo.id}`);
    });

    document.getElementById("chatForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      await createConversationIfNeeded();

      const input = document.getElementById("messageInput");
      const content = input.value.trim();
      const selectedProviders = getSelectedProviders();

      if (!content) return;

      document.getElementById("sendBtn").disabled = true;

      try {
        const res = await fetch(`/api/chat/conversations/${activeConversationId}/message`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ content, providers: selectedProviders })
        });

        const data = await res.json();

        if (!res.ok) {
          alert(data.error || "Something went wrong.");
        } else {
          input.value = "";
          await loadConversations();
          await openConversation(activeConversationId);
        }
      } catch (error) {
        alert("Network error. Please try again.");
      }

      document.getElementById("sendBtn").disabled = false;
    });

    document.getElementById("sidebarSearch").addEventListener("input", (e) => {
      const term = e.target.value.toLowerCase();
      const filtered = allConversations.filter((c) => c.title.toLowerCase().includes(term));
      renderSidebar(filtered);
    });

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    (async () => {
      await loadProviders();
      await loadConversations();

      const urlId = getIdFromUrl();
      if (urlId) {
        const id = parseInt(urlId, 10);
        if (allConversations.find((c) => c.id === id)) {
          await openConversation(id);
        }
      }
    })();
  </script>
</body>
</html>
