<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM Chat</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="chat-page">
    <div class="chat-shell">
      <aside class="chat-sidebar">
        <div class="sidebar-header">
          <div>
            <div class="sidebar-label">Workspace</div>
            <h2>Conversations</h2>
          </div>
          <form action="/api/chat/new" method="POST">
            <button type="submit" class="sidebar-new-chat">+ New Chat</button>
          </form>
        </div>

        <form class="sidebar-search" onsubmit="return false;">
          <input type="text" id="sidebarSearch" placeholder="Search chats...">
        </form>

        <div class="conversation-list" id="conversationList"></div>

        <div class="sidebar-footer">
          <a class="button button-secondary" href="/history">Full History</a>
          <a class="button button-secondary" href="/dashboard">Dashboard</a>
        </div>
      </aside>

      <main class="chat-main">
        <div class="chat-topbar">
          <div>
            <div class="chat-topbar-label">Active Conversation</div>
            <h1 id="chatTitle">Conversation</h1>
          </div>
          <div class="chat-topbar-actions">
            <a class="button button-secondary topbar-button" href="/history">History</a>
          </div>
        </div>

        <div class="chat-status-banner" id="chatStatusBanner">
          Continue an existing conversation or start a new one from the sidebar.
        </div>

        <div class="chat-window-modern" id="chatWindow"></div>

        <div class="chat-composer">
          <form class="chat-form" action="/api/chat" method="POST">
            <input type="text" name="message" placeholder="Type your message here..." required>
            <button type="submit">Send</button>
          </form>
        </div>
      </main>
    </div>
  </div>

  <script>
    const conversations = {
      1: {
        title: "Binary Trees Help",
        preview: "Last message: traversal explanation",
        messages: [
          { role: "You", type: "user", text: "Hello, can you help me with binary trees?" },
          { role: "LLM", type: "bot", text: "Of course. What part of binary trees are you working on right now?" },
          { role: "You", type: "user", text: "I need help understanding preorder, inorder, and postorder traversals." },
          { role: "LLM", type: "bot", text: "A good way to remember them is by where the root is visited. Preorder visits root first, inorder visits root in the middle, and postorder visits root last." }
        ]
      },
      2: {
        title: "API Design Questions",
        preview: "Last message: endpoint structure",
        messages: [
          { role: "You", type: "user", text: "Can you explain the difference between page routes and API routes?" },
          { role: "LLM", type: "bot", text: "Page routes render views for the user, while API routes handle backend actions such as login, logout, and data processing." }
        ]
      },
      3: {
        title: "Database Help",
        preview: "Last message: MySQL schema review",
        messages: [
          { role: "You", type: "user", text: "What fields should go in the users table?" },
          { role: "LLM", type: "bot", text: "A strong start is id, username, password, auth_provider, and created_at." }
        ]
      },
      4: {
        title: "Signals Homework",
        preview: "Last message: convolution steps",
        messages: [
          { role: "You", type: "user", text: "How do I start this convolution problem?" },
          { role: "LLM", type: "bot", text: "Start by identifying the overlap region and then compute the integral piece by piece." }
        ]
      },
      5: {
        title: "Rutgers CAS Flow",
        preview: "Last message: callback planning",
        messages: [
          { role: "You", type: "user", text: "Why is Rutgers CAS rejecting our app?" },
          { role: "LLM", type: "bot", text: "The app needs to be authorized and registered with Rutgers CAS before end-to-end login will work." }
        ]
      },
      6: {
        title: "Iteration 2 UI Ideas",
        preview: "Last message: sidebar history",
        messages: [
          { role: "You", type: "user", text: "Would moving history into a sidebar improve the flow?" },
          { role: "LLM", type: "bot", text: "Yes, it would make the chat page feel more integrated and reduce unnecessary page switching." }
        ]
      }
    };

    function getConversationId() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get("id");
      return conversations[id] ? id : "1";
    }

    function renderSidebar(activeId) {
      const list = document.getElementById("conversationList");
      list.innerHTML = "";

      Object.entries(conversations).forEach(([id, convo]) => {
        const link = document.createElement("a");
        link.href = `/chat?id=${id}`;
        link.className = `conversation-item ${id === activeId ? "active" : ""}`;
        link.innerHTML = `
          <div class="conversation-title">${convo.title}</div>
          <div class="conversation-preview">${convo.preview}</div>
        `;
        list.appendChild(link);
      });
    }

    function renderChat(id) {
      const convo = conversations[id];
      document.getElementById("chatTitle").textContent = convo.title;

      const chatWindow = document.getElementById("chatWindow");
      chatWindow.innerHTML = "";

      convo.messages.forEach((msg) => {
        const row = document.createElement("div");
        row.className = `message-row ${msg.type === "user" ? "message-row-user" : "message-row-bot"}`;

        row.innerHTML = `
          <div class="message-bubble ${msg.type === "user" ? "message-bubble-user" : "message-bubble-bot"}">
            <span class="message-role">${msg.role}</span>
            <p>${msg.text}</p>
          </div>
        `;

        chatWindow.appendChild(row);
      });
    }

    function setupSidebarSearch() {
      const input = document.getElementById("sidebarSearch");
      input.addEventListener("input", () => {
        const term = input.value.toLowerCase();
        document.querySelectorAll(".conversation-item").forEach((item) => {
          const text = item.textContent.toLowerCase();
          item.style.display = text.includes(term) ? "block" : "none";
        });
      });
    }

    const activeId = getConversationId();
    renderSidebar(activeId);
    renderChat(activeId);
    setupSidebarSearch();
  </script>
</body>
</html>
