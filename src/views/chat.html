<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM Chat</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="chat-page">
    <div class="chat-shell">

      
      <aside class="chat-sidebar">
        <div class="sidebar-header">
          <div>
            <div class="sidebar-label">Workspace</div>
            <h2>Conversations</h2>
          </div>
          <button id="newChatBtn" class="sidebar-new-chat">+ New Chat</button>
        </div>

        <form class="sidebar-search" onsubmit="return false;">
          <input type="text" id="sidebarSearch" placeholder="Search chats...">
        </form>

        <div class="conversation-list" id="conversationList"></div>

        <div class="sidebar-footer">
          <a class="button button-secondary" href="/history">Full History</a>
          <a class="button button-secondary" href="/dashboard">Dashboard</a>
        </div>
      </aside>

      
      <main class="chat-main">

        
        <div class="chat-topbar">
          <div>
            <div class="chat-topbar-label">Active Conversation</div>
            <h1 id="chatTitle">Select or start a conversation</h1>

            
            <div id="activeModelLabel" style="font-size:0.9rem;color:var(--muted);">
              Showing all models
            </div>
          </div>

          <div class="chat-topbar-actions">
            
            <button class="button button-secondary topbar-button"
                    onclick="selectModel(null)">
              Show All Models
            </button>

            <a class="button button-secondary topbar-button" href="/history">
              History
            </a>
          </div>
        </div>

        
        <div class="chat-status-banner" id="chatStatusBanner">
          Continue an existing conversation or start a new one from the sidebar.
        </div>

        
        <div id="chatWindow"></div>

        
        <div class="chat-composer">
          <form class="chat-form" id="chatForm">
            <input
              type="text"
              id="messageInput"
              name="message"
              placeholder="Type your message here..."
              autocomplete="off"
              required
            >
            <button type="submit" id="sendBtn">Send</button>
          </form>
        </div>

      </main>
    </div>
  </div>

  <script>
    let activeConversationId = null;
    let allConversations = [];

    
    let models = ["llama3.2", "mistral", "gemma"];
    let activeModel = null; // null = all models
    let currentMessages = {};

    function getIdFromUrl() {
      return new URLSearchParams(window.location.search).get("id");
    }

    async function loadConversations() {
      const res = await fetch("/api/chat/conversations");
      allConversations = await res.json();
      renderSidebar(allConversations);
    }

    function renderSidebar(conversations) {
      const list = document.getElementById("conversationList");
      list.innerHTML = "";

      if (conversations.length === 0) {
        list.innerHTML = '<p style="color:var(--muted);padding:8px;">No conversations yet.</p>';
        return;
      }

      conversations.forEach((convo) => {
        const a = document.createElement("a");
        a.href = `/chat?id=${convo.id}`;
        a.className = `conversation-item ${convo.id === activeConversationId ? "active" : ""}`;
        a.innerHTML = `
          <div class="conversation-title">${escapeHtml(convo.title)}</div>
          <div class="conversation-preview">
            ${formatDate(convo.updated_at)}
          </div>
        `;

        a.onclick = (e) => {
          e.preventDefault();
          openConversation(convo.id);
          history.pushState(null, "", `/chat?id=${convo.id}`);
        };

        list.appendChild(a);
      });
    }

    async function openConversation(id) {
      activeConversationId = id;

      document.getElementById("chatStatusBanner").style.display = "none";
      document.getElementById("chatWindow").innerHTML = "Loading...";

      const res = await fetch(`/api/chat/conversations/${id}`);
      const convo = await res.json();

      document.getElementById("chatTitle").textContent = convo.title;

      models = convo.models || ["llama3.2", "mistral", "gemma"];
      activeModel = convo.selected_model || null;
      currentMessages = convo.messages || {};

      updateModelLabel();
      renderMultiChat();
      renderSidebar(allConversations);
    }

    function updateModelLabel() {
      document.getElementById("activeModelLabel").textContent =
        activeModel ? `Focused: ${activeModel}` : "Showing all models";
    }

    
    function renderMultiChat() {
      const chatWindow = document.getElementById("chatWindow");
      chatWindow.innerHTML = "";

      const wrapper = document.createElement("div");
      wrapper.className = "chat-multi-window";

      models.forEach(model => {

        if (activeModel && model !== activeModel) return;

        const panel = document.createElement("div");
        panel.className = "llm-panel";
        if (activeModel === model) panel.classList.add("active");

        const msgs = currentMessages?.[model] || [];

        panel.innerHTML = `
          <div class="llm-header">
            <span>${model}</span>
            <div>
              <button onclick="selectModel('${model}')" class="llm-select-btn">Focus</button>
              <button onclick="selectModel(null)" class="llm-select-btn">All</button>
            </div>
          </div>

          <div class="llm-messages" id="messages-${model}">
            ${msgs.map(m => `
              <div class="message ${m.role}">
                <p>${escapeHtml(m.content)}</p>
              </div>
            `).join("")}
          </div>
        `;

        wrapper.appendChild(panel);
      });

      chatWindow.appendChild(wrapper);
    }

    
    async function selectModel(model) {
      if (!activeConversationId) return;

      await fetch(`/api/chat/conversations/${activeConversationId}/model`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ model })
      });

      activeModel = model;

      
      await openConversation(activeConversationId);
    }

    
    document.getElementById("newChatBtn").addEventListener("click", async () => {
      const res = await fetch("/api/chat/new", { method: "POST" });

      if (res.redirected) {
        const url = new URL(res.url);
        const id = parseInt(url.searchParams.get("id"), 10);

        await loadConversations();
        openConversation(id);
        history.pushState(null, "", `/chat?id=${id}`);
      }
    });

    
    document.getElementById("chatForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      if (!activeConversationId) return;

      const input = document.getElementById("messageInput");
      const content = input.value.trim();
      if (!content) return;

      input.value = "";

      
      models.forEach(m => {
        if (!currentMessages[m]) currentMessages[m] = [];
        currentMessages[m].push({ role: "user", content });
      });

      renderMultiChat();

      const res = await fetch(`/api/chat/conversations/${activeConversationId}/message`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ content, model: activeModel })
      });

      const data = await res.json();

      currentMessages = data.messages;
      renderMultiChat();
      loadConversations();
    });

    
    document.getElementById("sidebarSearch").addEventListener("input", (e) => {
      const term = e.target.value.toLowerCase();
      const filtered = allConversations.filter(c =>
        c.title.toLowerCase().includes(term)
      );
      renderSidebar(filtered);
    });

    
    function escapeHtml(text) {
      return text.replace(/&/g,"&amp;")
                .replace(/</g,"&lt;")
                .replace(/>/g,"&gt;");
    }

    function formatDate(ts) {
      if (!ts) return "";
      const d = new Date(ts);
      const now = new Date();
      const diff = Math.floor((now - d) / 1000);

      if (diff < 60) return "Just now";
      if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
      if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
      return d.toLocaleDateString();
    }

    
    (async () => {
      await loadConversations();
      const id = getIdFromUrl();
      if (id) openConversation(parseInt(id));
    })();

  </script>
</body>
</html>
