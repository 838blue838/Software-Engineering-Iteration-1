<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM Chat</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="chat-page">
    <div class="chat-shell">
      <aside class="chat-sidebar">
        <div class="sidebar-header">
          <div>
            <div class="sidebar-label">Workspace</div>
            <h2>Conversations</h2>
          </div>
          <button id="newChatBtn" class="sidebar-new-chat">+ New Chat</button>
        </div>

        <form class="sidebar-search" onsubmit="return false;">
          <input type="text" id="sidebarSearch" placeholder="Search chats...">
        </form>

        <div class="conversation-list" id="conversationList"></div>

        <div class="sidebar-footer">
          <a class="button button-secondary" href="/history">Full History</a>
          <a class="button button-secondary" href="/dashboard">Dashboard</a>
        </div>
      </aside>

      <main class="chat-main">
        <div class="chat-topbar">
          <div>
            <div class="chat-topbar-label">Active Conversation</div>
            <h1 id="chatTitle">Select or start a conversation</h1>
          </div>
          <div class="chat-topbar-actions">
            <select id="modelSelector" style="padding: 8px 12px; border-radius: 8px; background: #1a1a2e; color: white; border: 1px solid #333; margin-right: 10px;">
              <option value="">Loading models...</option>
            </select>
            <a class="button button-secondary topbar-button" href="/history">History</a>
          </div>
        </div>

        <div class="chat-status-banner" id="chatStatusBanner">
          Continue an existing conversation or start a new one from the sidebar.
        </div>

        <div class="chat-window-modern" id="chatWindow"></div>

        <div class="chat-composer">
          <form class="chat-form" id="chatForm">
            <input type="text" id="messageInput" name="message" placeholder="Type your message here..." autocomplete="off" required>
            <button type="submit" id="sendBtn">Send</button>
          </form>
        </div>
      </main>
    </div>
  </div>

  <script>
    let activeConversationId = null;
    let allConversations = [];

    function getIdFromUrl() {
      return new URLSearchParams(window.location.search).get("id");
    }

    async function loadModels() {
      try {
        const res = await fetch("/api/chat/models");
        const data = await res.json();
        const selector = document.getElementById("modelSelector");
        selector.innerHTML = "";

        for (const [providerKey, provider] of Object.entries(data)) {
          if (provider.models.length === 0) continue;
          const group = document.createElement("optgroup");
          group.label = provider.available ? provider.name : `${provider.name} (API key required)`;
          provider.models.forEach(model => {
            const opt = document.createElement("option");
            opt.value = model;
            opt.textContent = model;
            if (!provider.available) opt.disabled = true;
            group.appendChild(opt);
          });
          selector.appendChild(group);
        }
      } catch (err) {
        console.error("Failed to load models:", err);
      }
    }

    async function loadConversations() {
      const res = await fetch("/api/chat/conversations");
      allConversations = await res.json();
      renderSidebar(allConversations);
    }

    function renderSidebar(conversations) {
      const list = document.getElementById("conversationList");
      list.innerHTML = "";

      if (conversations.length === 0) {
        list.innerHTML = '<p style="color:var(--muted);padding:8px 4px;font-size:0.9rem;">No conversations yet.</p>';
        return;
      }

      conversations.forEach((convo) => {
        const a = document.createElement("a");
        a.href = `/chat?id=${convo.id}`;
        a.className = `conversation-item ${convo.id === activeConversationId ? "active" : ""}`;
        a.innerHTML = `
          <div class="conversation-title">${escapeHtml(convo.title)}</div>
          <div class="conversation-preview">${formatDate(convo.updated_at)}</div>
        `;
        a.addEventListener("click", (e) => {
          e.preventDefault();
          openConversation(convo.id);
          history.pushState(null, "", `/chat?id=${convo.id}`);
        });
        list.appendChild(a);
      });
    }

    async function openConversation(id) {
      activeConversationId = id;
      document.getElementById("chatStatusBanner").style.display = "none";
      document.getElementById("chatWindow").innerHTML = '<p style="color:var(--muted);padding:8px;">Loading...</p>';

      const res = await fetch(`/api/chat/conversations/${id}`);
      if (!res.ok) {
        document.getElementById("chatWindow").innerHTML = '<p style="color:var(--danger);padding:8px;">Failed to load conversation.</p>';
        return;
      }
      const convo = await res.json();
      document.getElementById("chatTitle").textContent = convo.title;

      renderMessages(convo.messages);
      renderSidebar(allConversations);
    }

    function renderMessages(messages) {
      const chatWindow = document.getElementById("chatWindow");
      chatWindow.innerHTML = "";

      if (messages.length === 0) {
        chatWindow.innerHTML = '<p style="color:var(--muted);padding:8px;">No messages yet. Send your first message below.</p>';
        return;
      }

      messages.forEach((msg) => appendMessage(msg.role, msg.content));
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function appendMessage(role, content) {
      const chatWindow = document.getElementById("chatWindow");
      const isUser = role === "user";

      const row = document.createElement("div");
      row.className = `message-row ${isUser ? "message-row-user" : "message-row-bot"}`;
      row.innerHTML = `
        <div class="message-bubble ${isUser ? "message-bubble-user" : "message-bubble-bot"}">
          <span class="message-role">${isUser ? "You" : "LLM"}</span>
          <p>${escapeHtml(content)}</p>
        </div>
      `;
      chatWindow.appendChild(row);
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    document.getElementById("newChatBtn").addEventListener("click", async () => {
      const res = await fetch("/api/chat/new", { method: "POST" });
      if (res.redirected) {
        const url = new URL(res.url);
        const id = parseInt(url.searchParams.get("id"), 10);
        await loadConversations();
        openConversation(id);
        history.pushState(null, "", `/chat?id=${id}`);
      }
    });

    document.getElementById("chatForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      if (!activeConversationId) return;

      const input = document.getElementById("messageInput");
      const content = input.value.trim();
      if (!content) return;

      input.value = "";
      document.getElementById("sendBtn").disabled = true;

      appendMessage("user", content);

      const thinking = document.createElement("div");
      thinking.className = "message-row message-row-bot";
      thinking.id = "thinkingRow";
      thinking.innerHTML = `
        <div class="message-bubble message-bubble-bot">
          <span class="message-role">LLM</span>
          <p style="color:var(--muted);font-style:italic;">Thinking...</p>
        </div>
      `;
      document.getElementById("chatWindow").appendChild(thinking);
      document.getElementById("chatWindow").scrollTop = document.getElementById("chatWindow").scrollHeight;

      try {
        const selectedModel = document.getElementById("modelSelector").value;
        const res = await fetch(`/api/chat/conversations/${activeConversationId}/message`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ content, model: selectedModel })
        });

        const row = document.getElementById("thinkingRow");
        if (row) row.remove();

        if (!res.ok) {
          const err = await res.json();
          appendMessage("assistant", `Error: ${err.error}`);
        } else {
          const data = await res.json();
          appendMessage("assistant", data.assistantMessage.content);

          // Refresh sidebar to show updated title/timestamp
          await loadConversations();
          const updated = allConversations.find(c => c.id === activeConversationId);
          if (updated) {
            document.getElementById("chatTitle").textContent = updated.title;
          }
        }
      } catch (err) {
        const row = document.getElementById("thinkingRow");
        if (row) row.remove();
        appendMessage("assistant", "Network error. Please try again.");
      }

      document.getElementById("sendBtn").disabled = false;
    });

    document.getElementById("sidebarSearch").addEventListener("input", (e) => {
      const term = e.target.value.toLowerCase();
      const filtered = allConversations.filter(c => c.title.toLowerCase().includes(term));
      renderSidebar(filtered);
    });

    function escapeHtml(text) {
      return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function formatDate(ts) {
      if (!ts) return "";
      const d = new Date(ts);
      const now = new Date();
      const diff = Math.floor((now - d) / 1000);
      if (diff < 60) return "Just now";
      if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
      if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
      return d.toLocaleDateString();
    }

    // Initialize
    (async () => {
      await loadModels();
      await loadConversations();
      const urlId = getIdFromUrl();
      if (urlId) {
        const id = parseInt(urlId, 10);
        if (allConversations.find(c => c.id === id)) {
          openConversation(id);
        }
      }
    })();
  </script>
</body>
</html>
